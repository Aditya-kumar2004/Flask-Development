{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h3>Edit Employee</h3>
        </div>
        <div class="card-body">
            <form action="/employee/employeeUpdate/{{ employee.id }}" method="POST" class="p-4">
                <div class="form-group mb-3">
                    <label for="name">Employee Name</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ employee.name }}" required>
                </div>

                <div class="form-group mb-3">
                    <label for="email">Email</label>
                    <input type="email" class="form-control" id="email" name="email" value="{{ employee.email }}" required>
                </div>

                <div class="form-group mb-3">
                    <label for="password">Password</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Enter new password if changing">
                </div>

                <div class="form-group mb-3">
                    <label for="department">Department</label>
                    <input type="text" class="form-control" id="department" name="department" value="{{ employee.department }}" required>
                </div>

                <div class="form-group mb-3">
                    <label for="salary">Salary</label>
                    <input type="number" step="0.01" class="form-control" id="salary" name="salary" value="{{ employee.salary }}" required>
                </div>

                <button type="submit" class="btn btn-success">Save Changes</button>
                <a href="/employee/list" class="btn btn-secondary ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
