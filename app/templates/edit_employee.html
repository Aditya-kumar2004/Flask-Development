{% extends "base.html" %}
{% block content %}
<div class="container my-3">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow border-0 rounded-3">
                <div class="card-body p-4">
                    <h2 class="fw-bold text-center mb-4">Edit Profile</h2>
                    <form action="/employee/employeeUpdate/{{ employee.id }}" method="POST">
                        
                        <!-- Row 1: Name & Email -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="name" class="form-label fw-semibold mb-1">Employee Name</label>
                                <input type="text" class="form-control py-2 shadow-sm" id="name" name="name" value="{{ employee.name }}" required placeholder="Enter your name">
                            </div>
                            <div class="col-md-6 mt-3 mt-md-0">
                                <label for="email" class="form-label fw-semibold mb-1">Email Address</label>
                                <input type="email" class="form-control py-2 shadow-sm" id="email" name="email" value="{{ employee.email }}" required placeholder="Enter your email">
                            </div>
                        </div>

                        <!-- Row 2: Password & Role -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="password" class="form-label fw-semibold mb-1">Password</label>
                                <input type="password" class="form-control py-2 shadow-sm" id="password" name="password" placeholder="Enter your password">
                                <small class="text-muted small-text">Leave blank if you don't want to change password</small>
                            </div>
                            <div class="col-md-6 mt-3 mt-md-0">
                                <label for="role" class="form-label fw-semibold mb-1">Role</label>
                                <select class="form-select py-2 shadow-sm" id="role" name="role" required>
                                    <option value="Employee" {% if employee.role == 'Employee' %}selected{% endif %}>Regular Employee</option>
                                    <option value="Admin" {% if employee.role == 'Admin' %}selected{% endif %}>Administrator</option>
                                </select>
                            </div>
                        </div>

                        <!-- Row 3: Salary & Department -->
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="salary" class="form-label fw-semibold mb-1">Salary</label>
                                <input type="number" step="0.01" class="form-control py-2 shadow-sm" id="salary" name="salary" value="{{ employee.salary }}" required placeholder="Enter your salary">
                            </div>
                            <div class="col-md-6 mt-3 mt-md-0">
                                <label for="department" class="form-label fw-semibold mb-1">Department</label>
                                <input type="text" class="form-control py-2 shadow-sm" id="department" name="department" value="{{ employee.department }}" required placeholder="Enter your department">
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a href="/employee/list" class="btn btn-outline-secondary px-4 py-2 rounded-pill shadow-sm">Cancel</a>
                            <button type="submit" class="btn btn-success px-4 py-2 rounded-pill shadow-sm">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
