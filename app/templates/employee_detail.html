{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h3>Employee Details</h3>
        </div>
        <div class="card-body">
            {% if employee %}
            <dl class="row">
                <dt class="col-sm-3">Name</dt>
                <dd class="col-sm-9">{{ employee.name }}</dd>

                <dt class="col-sm-3">Email</dt>
                <dd class="col-sm-9">{{ employee.email }}</dd>

                <dt class="col-sm-3">Department</dt>
                <dd class="col-sm-9">{{ employee.department }}</dd>

                <dt class="col-sm-3">Salary</dt>
                <dd class="col-sm-9">{{ employee.salary }}</dd>
            </dl>
            {% else %}
            <div class="alert alert-warning">Employee not found.</div>
            {% endif %}

            <a href="/employee/list" class="btn btn-secondary">Back to Employee List</a>
        </div>
    </div>
</div>
{% endblock %}
