{% extends "base.html" %}


{% block content %}
<div class="card mt-4">
    <div class="card-header">
        <h3>Add Employee</h3>
    </div>

    <div class="card-body">
        <form action="/employee/add" method="POST" class="p-4">

            <div class="form-group">
                <label for="name">Employee Name</label>
                <input type="text" class="form-control" id="name" name="name" placeholder="Enter employee name" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="Enter email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
            </div>

            <div class="form-group">
                <label for="department">Department</label>
                <input type="text" class="form-control" id="department" name="department" placeholder="Enter department" required>
            </div>

            <div class="form-group">
                <label for="salary">Salary</label>
                <input type="number" class="form-control" id="salary" name="salary" placeholder="Enter salary" required>
            </div>

            <button type="submit" class="btn btn-primary">
                Add Employee
            </button>

            <button type="reset" class="btn btn-secondary">
                Reset
            </button>

        </form>
    </div>
</div>
{% endblock %}
