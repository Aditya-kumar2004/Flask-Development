{% extends "base.html" %}
{% block content %}
<div class="container my-3">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow border-0 rounded-3">
                <div class="card-body p-4">
                    <h2 class="fw-bold text-center mb-4">Create Account</h2>
                    <form action="/employee/register" method="POST">
                        
                        <!-- Row 1: Name & Email -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="name" class="form-label fw-semibold mb-1">Full Name</label>
                                <input type="text" class="form-control py-2 shadow-sm" id="name" name="name" required placeholder="Enter your name">
                            </div>
                            <div class="col-md-6 mt-3 mt-md-0">
                                <label for="email" class="form-label fw-semibold mb-1">Email Address</label>
                                <input type="email" class="form-control py-2 shadow-sm" id="email" name="email" required placeholder="Enter your email">
                            </div>
                        </div>

                        <!-- Row 2: Password & Role -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="password" class="form-label fw-semibold mb-1">Password</label>
                                <input type="password" class="form-control py-2 shadow-sm" id="password" name="password" required placeholder="Enter your password">
                            </div>
                            <div class="col-md-6 mt-3 mt-md-0">
                                <label for="role" class="form-label fw-semibold mb-1">Role</label>
                                <select class="form-select py-2 shadow-sm" id="role" name="role" required>
                                    <option value="Employee" selected>Regular Employee</option>
                                    <option value="Admin">Administrator</option>
                                </select>
                            </div>
                        </div>

                        <!-- Row 3: Salary & Department -->
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="salary" class="form-label fw-semibold mb-1">Salary</label>
                                <input type="number" class="form-control py-2 shadow-sm" id="salary" name="salary" required placeholder="Enter your salary">
                            </div>
                            <div class="col-md-6 mt-3 mt-md-0">
                                <label for="department" class="form-label fw-semibold mb-1">Department</label>
                                <input type="text" class="form-control py-2 shadow-sm" id="department" name="department" required placeholder="Enter your department">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success w-100 py-2 rounded-pill shadow-sm">Register</button>
                    </form>
                    <div class="text-center mt-3">
                        <span class="text-muted small">Already have an account? <a href="/employee/login" class="text-primary text-decoration-none">Login here</a></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
