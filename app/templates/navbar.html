<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container-fluid px-4">
        <!-- Brand Logo/Name -->
        <a class="navbar-brand d-flex align-items-center gap-2" href="/home">
            <span class="fs-4 fw-bold bg-primary text-white px-2 py-1 rounded">💼</span>
            <span class="fs-5 fw-semibold tracking-wide text-white">EMS</span>
        </a>

        <!-- Mobile Toggler -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarContent"
            aria-controls="navbarContent"
            aria-expanded="false"
            aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navigation Links -->
        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-3">
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/home' %}active{% endif %}" href="/home">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/department' %}active{% endif %}" href="/department">Department</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/employee' in request.path %}active{% endif %}" href="/employee/list">Employees</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/contact' %}active{% endif %}" href="/contact">Contact</a>
                </li>
            </ul>

            <!-- Authentication Actions -->
            <div class="d-flex align-items-center gap-3">
                {% if session.get('user_id') %}
                    <span class="text-light me-2">Welcome, <strong>{{ session.get('user_name') }}</strong>!</span>
                    <a href="/employee/logout" class="btn btn-outline-danger px-4 py-2 rounded-pill shadow-sm">Logout</a>
                {% else %}
                    <a href="/employee/login" class="btn btn-link text-light text-decoration-none px-3">Login</a>
                    <a href="/employee/register" class="btn btn-success px-4 py-2 rounded-pill shadow-sm">Register</a>
                {% endif %}
            </div>

        </div>
    </div>
</nav>
